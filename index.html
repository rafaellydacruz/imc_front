<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs com api</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="Tabs">
        <button class="tab-btn active" onclick="abrirTab(0)">IMC</button>
        <button class="tab-btn" onclick="abrirTab(1)">Média</button>
    </div>

    <div class="tab-content active">
        <h2>Calcular o IMC</h2>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="number" id="idade" placeholder="Digite sua idade">
        <input type="number" id="altura" placeholder="Digite sua altura">
        <input type="number" id="peso" placeholder="Digite seu peso">
        <button onclick="calcularImc()">Calcular IMC</button>
        <div class="resultado" id="resultadoImc"></div>
    </div>

    <div class="tab-content ">
        <h2>Calcular  média</h2>
        
        <input type="number" id="nota1" placeholder="Digite sua primeira nota">
        <input type="number" id="nota2" placeholder="Digite sua segunda nota">

        <button onclick="calcularMedia()">Calcular MÉDIA</button>
        <div class="resultado" id="resultadoMedia"></div>
    </div>

   <script src="index.js"></script>
</body>

</html>
